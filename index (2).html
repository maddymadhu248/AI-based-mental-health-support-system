<style>
:root{
  --lavender:#8C7AE6;
  --lavender-dark:#6E5FD1;
  --sage:#4F9D82;
  --coral:#F2846B;
  --ink:#1B1B3A;
  --mist:#F3F1FA;
  --surface:#FFFFFF;
  --border:#E4E0F5;
  --text:#26243F;
  --text-dim:#6B6885;
  --danger:#E15B64;
  --radius:16px;
  --shadow:0 8px 24px rgba(44,32,90,0.08);
  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}
html[data-theme="dark"]{
  --ink:#F3F1FA;
  --mist:#14141F;
  --surface:#1E1E2E;
  --border:#33324A;
  --text:#EDEBFB;
  --text-dim:#A7A4C4;
  --shadow:0 8px 24px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-body);background:var(--mist);color:var(--text);transition:background .3s,color .3s;}
h1,h2,h3,.brand{font-family:var(--font-display);}
button{font-family:var(--font-body);cursor:pointer;}
a{color:inherit;}
::selection{background:var(--lavender);color:#fff;}
@media (prefers-reduced-motion: reduce){*{animation-duration:0.001ms !important;}}

/* ---------- Halo signature element ---------- */
.halo-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.halo-ring{position:absolute;border-radius:50%;border:1.5px solid var(--lavender);opacity:.55;animation:breathe 4.5s ease-in-out infinite;}
.halo-ring.r2{animation-delay:.6s;border-color:var(--sage);}
.halo-ring.r3{animation-delay:1.2s;border-color:var(--coral);}
.halo-core{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--lavender),var(--sage));box-shadow:0 0 24px rgba(140,122,230,.5);}
@keyframes breathe{
  0%{width:40px;height:40px;opacity:.75;}
  50%{width:120px;height:120px;opacity:.1;}
  100%{width:40px;height:40px;opacity:.75;}
}
.halo-ring.r1{width:40px;height:40px;}
.halo-ring.r2{width:40px;height:40px;}
.halo-ring.r3{width:40px;height:40px;}

/* ---------- Auth pages ---------- */
.auth-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);max-width:420px;width:100%;padding:40px 36px;}
.brand{font-size:28px;font-weight:600;text-align:center;letter-spacing:.5px;margin:18px 0 4px;}
.brand-sub{text-align:center;color:var(--text-dim);font-size:13px;margin-bottom:24px;letter-spacing:.3px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-dim);}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--mist);color:var(--text);font-size:14px;font-family:var(--font-body);}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--lavender);outline-offset:1px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:10px;border:none;font-weight:600;font-size:14px;transition:transform .15s, box-shadow .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--lavender);color:#fff;width:100%;}
.btn-primary:hover{background:var(--lavender-dark);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--lavender);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;}
.auth-links{text-align:center;font-size:13px;margin-top:16px;color:var(--text-dim);}
.auth-links a,.link-btn{color:var(--lavender);font-weight:600;text-decoration:none;background:none;border:none;cursor:pointer;font-size:inherit;}
.hint-box{background:var(--mist);border:1px dashed var(--border);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text-dim);margin-top:14px;font-family:var(--font-mono);}
.error-text{color:var(--danger);font-size:12px;margin-top:6px;}
.success-text{color:var(--sage);font-size:12px;margin-top:6px;}

/* ---------- App shell ---------- */
.app-shell{display:flex;min-height:100vh;}
.sidebar{width:236px;background:var(--surface);border-right:1px solid var(--border);padding:22px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:0 8px 18px;font-family:var(--font-display);font-weight:600;font-size:20px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.sidebar-brand .dot{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--lavender),var(--sage));}
.nav-group-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);padding:14px 10px 6px;}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;color:var(--text-dim);text-decoration:none;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:var(--font-body);}
.nav-link:hover{background:var(--mist);color:var(--text);}
.nav-link.active{background:var(--lavender);color:#fff;font-weight:600;}
.nav-icon{width:18px;text-align:center;}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}

.main-col{flex:1;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.topbar-title{font-family:var(--font-display);font-size:20px;font-weight:600;}
.topbar-actions{display:flex;align-items:center;gap:14px;}
.icon-btn{background:var(--mist);border:1px solid var(--border);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;}
.badge-dot{position:absolute;top:-4px;right:-4px;background:var(--coral);color:#fff;font-size:10px;border-radius:10px;padding:1px 5px;font-weight:700;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--lavender),var(--sage));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
.content{padding:28px;max-width:1080px;margin:0 auto;}

/* ---------- Cards / generic ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:var(--shadow);}
.card h3{margin-top:0;}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(230px,1fr));}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));}
.stat{background:var(--mist);border-radius:12px;padding:16px;}
.stat .num{font-family:var(--font-display);font-size:28px;font-weight:600;}
.stat .lab{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;}
.pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.pill-low{background:#E4F5EC;color:var(--sage);}
.pill-mod{background:#FFF1DE;color:#B5750E;}
.pill-high{background:#FCE6E4;color:var(--danger);}
html[data-theme="dark"] .pill-low{background:#173428;}
html[data-theme="dark"] .pill-mod{background:#3a2c14;}
html[data-theme="dark"] .pill-high{background:#3a1f1f;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);z-index:999;animation:toastIn .25s ease;}
html[data-theme="dark"] .toast{background:var(--lavender);}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Chat ---------- */
.chat-box{display:flex;flex-direction:column;height:460px;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;background:var(--mist);border-radius:12px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:72%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.4;}
.msg.me{align-self:flex-end;background:var(--lavender);color:#fff;border-bottom-right-radius:4px;}
.msg.bot,.msg.peer{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg .who{font-size:11px;color:var(--text-dim);margin-bottom:2px;font-weight:600;}
.chat-input-row{display:flex;gap:8px;margin-top:12px;}
.chat-input-row input{flex:1;}

/* ---------- Mood ---------- */
.mood-picker{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:18px 0;}
.mood-opt{font-size:34px;background:var(--mist);border:2px solid transparent;border-radius:16px;padding:14px 18px;transition:transform .15s,border-color .15s;}
.mood-opt:hover{transform:translateY(-3px);}
.mood-opt.selected{border-color:var(--lavender);background:#fff;}
html[data-theme="dark"] .mood-opt.selected{background:var(--surface);}

/* ---------- Breathing ---------- */
.breathe-stage{display:flex;flex-direction:column;align-items:center;padding:30px 0;}
.breathe-circle{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--lavender),var(--sage));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-family:var(--font-display);font-size:18px;transition:transform 4s ease-in-out;}
.breathe-circle.in{transform:scale(1.35);}
.breathe-circle.out{transform:scale(1);}

/* ---------- Table ---------- */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);}
th{color:var(--text-dim);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.05em;}

/* ---------- Toggle switch ---------- */
.switch{position:relative;display:inline-block;width:42px;height:24px;}
.switch input{opacity:0;width:0;height:0;}
.slider-tog{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:24px;transition:.2s;}
.slider-tog:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
input:checked + .slider-tog{background:var(--lavender);}
input:checked + .slider-tog:before{transform:translateX(18px);}

/* ---------- Progress bar ---------- */
.progress-track{background:var(--mist);border-radius:10px;height:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--lavender),var(--sage));border-radius:10px;transition:width .4s;}

.badge-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:12px;}
.badge-icon{width:42px;height:42px;border-radius:50%;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.badge-icon.locked{opacity:.35;filter:grayscale(1);}

.resource-card{border-left:4px solid var(--lavender);}
.emergency-hero{background:linear-gradient(135deg,var(--danger),var(--coral));color:#fff;border-radius:var(--radius);padding:26px;}
.emergency-hero a{color:#fff;font-weight:700;}

@media (max-width:820px){
  .sidebar{position:fixed;left:-260px;z-index:50;transition:left .2s;box-shadow:var(--shadow);}
  .sidebar.open{left:0;}
  .content{padding:16px;}
  .topbar{padding:12px 16px;}
}
.menu-toggle{display:none;}
@media (max-width:820px){.menu-toggle{display:flex;}}
</style>
</head>
<body>
<div id="app"><div class="auth-shell"><div class="auth-card">
    <div class="halo-wrap"><div class="halo-ring r1"></div><div class="halo-ring r2"></div><div class="halo-ring r3"></div><div class="halo-core"></div></div>
    <div class="brand">MINDORA</div>
    <div class="brand-sub">Smart Student Mental Wellness Platform</div>
    
  <form onsubmit="handleLogin(event)">
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@student.com" required=""></div>

    <div id="login-error"></div>
    <button class="btn btn-primary" type="submit">Log in</button>
  </form>
  <div class="auth-links">
    <button class="link-btn" onclick="go(&#39;forgot&#39;)">Forgot password?</button> &nbsp;•&nbsp;
    Don't have an account? <button class="link-btn" onclick="go(&#39;signup&#39;)">Sign up</button>
  </div>
  </div></div><div id="toast-slot"></div></div>

<script>
/* =========================================================
   MINDORA — in-memory application state (no backend/storage)
   ========================================================= */
const state = {
  page: 'login',
  theme: 'light',
  toastMsg: null,
  sidebarOpen: false,
  currentUser: null,
  users: [
    {name:'Admin', email:'admin@mindora.com', password:'Admin@123', role:'admin', points:0, badges:[], meditationSessions:0, peerMsgCount:0, emergencyContact:'', notifPrefs:{email:true,push:true}},
    {name:'Aarav Sharma', email:'aarav@student.com', password:'Student@123', role:'student', points:35, badges:['first-step'], meditationSessions:1, peerMsgCount:0, emergencyContact:'', notifPrefs:{email:true,push:true}},
  ],
  moods: [], // {email, date, mood, value, note}
  assessments: [], // {email, date, score, category}
  appointments: [], // {id, email, counselor, date, time, reason, status}
  notifications: [], // {id, email, text, date, read}
  feedbacks: [], // {id, email, type, message, date, status}
  chatMessages: [], // {sender:'me'|'bot', text}
  peerMessages: [], // {sender, text}
  lastAssessment: null,
  resetEmail: null,
};

const MOODS = [
  {emoji:'😄', label:'Great', value:5},
  {emoji:'🙂', label:'Good', value:4},
  {emoji:'😐', label:'Okay', value:3},
  {emoji:'☹️', label:'Low', value:2},
  {emoji:'😢', label:'Struggling', value:1},
];

const QUESTIONS = [
  "I feel overwhelmed by my academic workload.",
  "I have trouble sleeping because of stress or worry.",
  "I feel anxious about exams or assignments.",
  "I find it hard to concentrate on my studies.",
  "I feel isolated or disconnected from friends or family.",
  "I experience physical symptoms of stress (headaches, fatigue).",
  "I feel hopeless or unsure about the future.",
  "I have lost interest in activities I used to enjoy.",
  "I feel pressure to meet others' expectations of me.",
  "I find it difficult to relax or unwind.",
];
const OPTIONS = ["Never","Rarely","Sometimes","Often"];

const RESOURCES = [
  {cat:'Anxiety', title:'Understanding Exam Anxiety', body:'Learn how anxiety shows up before tests and grounding techniques to steady your body and mind before you walk in.'},
  {cat:'Depression', title:'Recognising Low Mood Early', body:'Common signs of low mood in students, and small daily actions that can help you feel more like yourself.'},
  {cat:'Sleep', title:'Building a Wind-Down Routine', body:'A simple 30-minute pre-sleep routine to help your mind switch off after a long study day.'},
  {cat:'Stress', title:'Managing Deadline Pressure', body:'Breaking large workloads into manageable steps, and why perfection is not the goal.'},
  {cat:'Academic Pressure', title:'Talking to Family About Grades', body:'Scripts and approaches for conversations with parents or guardians about academic pressure.'},
  {cat:'Sleep', title:'Why Screens Before Bed Matter', body:'The link between late-night screen use and restless sleep, and easy swaps to try tonight.'},
];

const COUNSELORS = ['Dr. Meera Iyer — Clinical Psychologist', 'Mr. Rohan Das — Student Counselor', 'Dr. Priya Nair — Wellness Therapist'];
const TIME_SLOTS = ['10:00 AM','11:30 AM','1:00 PM','3:00 PM','4:30 PM','6:00 PM'];

/* ---------------- utility ---------------- */
function uid(){ return Math.random().toString(36).slice(2,10); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function showToast(msg){ state.toastMsg = msg; render(); setTimeout(()=>{ state.toastMsg=null; renderToastOnly(); }, 2600); }
function renderToastOnly(){ const el=document.getElementById('toast-slot'); if(el) el.innerHTML = state.toastMsg ? `<div class="toast">${state.toastMsg}</div>` : ''; }
function go(page){ state.page = page; state.sidebarOpen=false; render(); window.scrollTo(0,0); }
function currentUser(){ return state.currentUser; }
function findUser(email){ return state.users.find(u=>u.email.toLowerCase()===email.toLowerCase()); }

function addNotification(text){
  const u = currentUser();
  if(!u) return;
  state.notifications.unshift({id:uid(), email:u.email, text, date:new Date().toISOString(), read:false});
}

function awardPoints(n, reason){
  const u = currentUser(); if(!u) return;
  u.points += n;
  addNotification(`+${n} points — ${reason}`);
  checkBadges();
}

const BADGE_DEFS = [
  {id:'first-step', icon:'🌱', name:'First Step', desc:'Joined MINDORA', check:u=>true},
  {id:'self-aware', icon:'🧠', name:'Self-Aware', desc:'Completed a self-assessment', check:u=>state.assessments.some(a=>a.email===u.email)},
  {id:'tracker-7', icon:'🔥', name:'Consistent Tracker', desc:'7-day mood logging streak', check:u=>moodStreak(u.email)>=7},
  {id:'zen-master', icon:'🧘', name:'Zen Master', desc:'Completed 5 meditation sessions', check:u=>u.meditationSessions>=5},
  {id:'helper', icon:'🤝', name:'Peer Helper', desc:'Active in peer support chat', check:u=>u.peerMsgCount>=3},
];

function checkBadges(){
  const u = currentUser(); if(!u) return;
  BADGE_DEFS.forEach(b=>{
    if(!u.badges.includes(b.id) && b.check(u)){
      u.badges.push(b.id);
      addNotification(`🏅 New badge unlocked: ${b.name}`);
    }
  });
}

function moodStreak(email){
  const entries = state.moods.filter(m=>m.email===email).map(m=>m.date).sort().reverse();
  if(entries.length===0) return 0;
  let streak = 0;
  let cursor = new Date();
  for(let i=0;i<entries.length;i++){
    const expected = new Date(cursor); expected.setDate(expected.getDate()-i);
    if(entries[i] === expected.toISOString().slice(0,10)) streak++;
    else break;
  }
  return streak;
}

/* ---------------- validation helpers ---------------- */
function isValidEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function isStrongPassword(p){ return p.length>=6; }

/* =========================================================
   RENDER — top level router
   ========================================================= */
function render(){
  document.documentElement.setAttribute('data-theme', state.theme);
  const app = document.getElementById('app');
  let html = '';
  const publicPages = ['login','signup','forgot'];
  if(!state.currentUser && !publicPages.includes(state.page)) state.page = 'login';

  if(publicPages.includes(state.page)){
    html = renderAuthWrapper();
  } else {
    html = renderAppShell();
  }
  app.innerHTML = html + `<div id="toast-slot">${state.toastMsg ? `<div class="toast">${state.toastMsg}</div>` : ''}</div>`;
}

/* ---------------- AUTH pages ---------------- */
function renderAuthWrapper(){
  let inner = '';
  if(state.page==='login') inner = pageLogin();
  else if(state.page==='signup') inner = pageSignup();
  else if(state.page==='forgot') inner = pageForgot();
  return `<div class="auth-shell"><div class="auth-card">
    <div class="halo-wrap"><div class="halo-ring r1"></div><div class="halo-ring r2"></div><div class="halo-ring r3"></div><div class="halo-core"></div></div>
    <div class="brand">MINDORA</div>
    <div class="brand-sub">Smart Student Mental Wellness Platform</div>
    ${inner}
  </div></div>`;
}

function pageLogin(){
  return `
  <form onsubmit="handleLogin(event)">
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@student.com" required></div>
    <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="Your password" required></div>
    <div id="login-error"></div>
    <button class="btn btn-primary" type="submit">Log in</button>
  </form>
  <div class="auth-links">
    <button class="link-btn" onclick="go('forgot')">Forgot password?</button> &nbsp;•&nbsp;
    Don't have an account? <button class="link-btn" onclick="go('signup')">Sign up</button>
  </div>`;
}

function handleLogin(e){
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const u = findUser(email);
  const errEl = document.getElementById('login-error');
  if(!u || u.password !== pass){
    errEl.innerHTML = `<div class="error-text">Incorrect email or password. Please try again.</div>`;
    return;
  }
  state.currentUser = u;
  checkBadges();
  go('dashboard');
  showToast(`Welcome back, ${u.name.split(' ')[0]}!`);
}

function pageSignup(){
  return `
  <form onsubmit="handleSignup(event)">
    <div class="field"><label>Full name</label><input type="text" id="su-name" required></div>
    <div class="field"><label>Email</label><input type="email" id="su-email" required></div>
    <div class="field"><label>Password</label><input type="password" id="su-password" placeholder="At least 6 characters" required></div>
    <div class="field"><label>Confirm password</label><input type="password" id="su-password2" required></div>
    <div id="signup-error"></div>
    <button class="btn btn-primary" type="submit">Create account</button>
  </form>
  <div class="auth-links">Already have an account? <button class="link-btn" onclick="go('login')">Log in</button></div>`;
}

function handleSignup(e){
  e.preventDefault();
  const name = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const p1 = document.getElementById('su-password').value;
  const p2 = document.getElementById('su-password2').value;
  const errEl = document.getElementById('signup-error');
  if(!isValidEmail(email)){ errEl.innerHTML = `<div class="error-text">Enter a valid email address.</div>`; return; }

  return `

function handleAssessmentSubmit(e){
  e.preventDefault();
  let score = 0;
  for(let i=0;i<QUESTIONS.length;i++){
    const val = document.querySelector(`input[name="q${i}"]:checked`);

  const category = score<=10 ? 'Low' : score<=20 ? 'Moderate' : 'High';
  const u = currentUser();
  const record = {email:u.email, date: new Date().toISOString(), score, category};
  state.assessments.push(record);
  state.lastAssessment = record;
  awardPoints(10, 'Completed self-assessment');
  addNotification('Your self-assessment result is ready.');
  go('assessment-result');
}

/* ---------------- MOOD HISTORY / ANALYTICS ---------------- */
function pageMoodHistory(){
  const rows = state.moods.filter(m=>m.email===currentUser().email).slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(!rows.length) return `<div class="empty-state">No mood data yet. <button class="link-btn" onclick="go('mood')">Log your first mood</button></div>`;
  const last14 = rows.slice(-14);
  const avg = (rows.reduce((s,r)=>s+r.value,0)/rows.length).toFixed(1);
  const streak = moodStreak(currentUser().email);

  const w=600,h=180,pad=24;
  const stepX = last14.length>1 ? (w-2*pad)/(last14.length-1) : 0;
  const pts = last14.map((r,i)=>{
    const x = pad + i*stepX;
    const y = h - pad - ((r.value-1)/4)*(h-2*pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const dots = last14.map((r,i)=>{
    const x = pad + i*stepX;
    const y = h - pad - ((r.value-1)/4)*(h-2*pad);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="var(--lavender)"><title>${fmtDate(r.date)}: ${MOODS.find(m=>m.value===r.value).label}</title></circle>`;
  }).join('');

  return `
  <div class="grid grid-3">
    <div class="stat"><div class="num">${avg}</div><div class="lab">Average Mood (1–5)</div></div>
    <div class="stat"><div class="num">${streak}</div><div class="lab">Current Streak</div></div>
    <div class="stat"><div class="num">${rows.length}</div><div class="lab">Total Entries</div></div>
  </div>
  <div class="card">
    <h3>Trend (last ${last14.length} entries)</h3>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">
      <polyline points="${pts}" fill="none" stroke="var(--sage)" stroke-width="2"/>
      ${dots}
    </svg>
  </div>
  <div class="card">
    <h3>Log</h3>
    <table><tr><th>Date</th><th>Mood</th><th>Note</th></tr>
    ${rows.slice().reverse().map(r=>`<tr><td>${fmtDate(r.date)}</td><td>${MOODS.find(m=>m.value===r.value).emoji} ${MOODS.find(m=>m.value===r.value).label}</td><td>${r.note||'—'}</td></tr>`).join('')}
    </table>
  </div>`;
}

function pageChatbot(){
  if(state.chatMessages.length===0){
    state.chatMessages.push({sender:'bot', text:`Hi ${currentUser().name.split(' ')[0]}, I'm Mira, your MINDORA companion. I'm not a substitute for professional care, but I'm here to listen. What's on your mind today?`});
  }
  return `
  <div class="card chat-box">
    <div class="chat-messages" id="chat-messages">
      ${state.chatMessages.map(m=>`<div class="msg ${m.sender==='me'?'me':'bot'}">${m.sender==='bot'?'<div class="who">Mira · AI Companion</div>':''}${m.text}</div>`).join('')}
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter'){sendChat();}">
      <button class="btn btn-primary" style="width:auto;" onclick="sendChat()">Send</button>
    </div>
  </div>`;
}
function scrollChatToBottom(id){ const el=document.getElementById(id); if(el) el.scrollTop = el.scrollHeight; }

function botReply(text){
  const t = text.toLowerCase();
  if(/(suicide|kill myself|end my life|self harm|hurt myself|want to die)/.test(t)){
    return `That sounds incredibly heavy, and I'm really glad you told me. Your safety matters most right now — please visit the Emergency Help page for hotlines you can call immediately, or reach out to someone you trust nearby.`;
  }
  if(/(exam|test|assignment|study|deadline)/.test(t)) return `Exam pressure can feel relentless. Try breaking your work into 25-minute focused blocks with short breaks — and remember, one exam doesn't define you. Want a quick breathing exercise?`;
  if(/(sleep|insomnia|tired|can't sleep)/.test(t)) return `Sleep trouble is common under stress. A consistent wind-down routine can help — you can find one in Mental Health Resources. Would you like me to open that for you?`;
  if(/(sad|down|depress|hopeless)/.test(t)) return `I'm sorry you're feeling this way. You don't have to carry it alone — logging your mood can help track patterns, and talking to a counselor can really help too.`;
  if(/(anxious|anxiety|nervous|panic)/.test(t)) return `Anxiety can feel overwhelming in the moment. Try the 5-4-3-2-1 grounding technique: name 5 things you see, 4 you can touch, 3 you hear, 2 you smell, 1 you taste.`;
  if(/(lonely|alone|isolated)/.test(t)) return `Feeling disconnected is hard. Our Peer Support Chat is a space with others who understand — would you like to try it?`;
  if(/(thank|thanks)/.test(t)) return `Anytime. I'm proud of you for checking in with yourself today.`;
  if(/(hello|hi|hey)/.test(t)) return `Hello! How has your day been so far?`;
  const generic = ["I hear you. Can you tell me a bit more about that?","That makes sense. How long have you been feeling this way?","Thank you for sharing that with me. What usually helps you feel a little better?","I'm here with you. Would journaling or a short meditation help right now?"];
  return generic[Math.floor(Math.random()*generic.length)];
}

function sendChat(){
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  state.chatMessages.push({sender:'me', text});
  input.value='';
  render();
  scrollChatToBottom('chat-messages');
  setTimeout(()=>{
    state.chatMessages.push({sender:'bot', text: botReply(text)});
    render();
    scrollChatToBottom('chat-messages');
  }, 550);
}

function sendPeer(){
  const input = document.getElementById('peer-input');
  const text = input.value.trim();
  if(!text) return;
  state.peerMessages.push({sender:'me', text});
  input.value='';
  const u = currentUser();
  u.peerMsgCount = (u.peerMsgCount||0)+1;
  checkBadges();
  render();
  scrollChatToBottom('peer-messages');
  setTimeout(()=>{
    const name = PEER_NAMES[Math.floor(Math.random()*PEER_NAMES.length)];
    const reply = PEER_REPLIES[Math.floor(Math.random()*PEER_REPLIES.length)];
    state.peerMessages.push({sender:'peer', name, text:reply});
    render();
    scrollChatToBottom('peer-messages');
  }, 700);
}

function appointmentsTable(){
  const rows = state.appointments.filter(a=>a.email===currentUser().email).slice().reverse();

  return `<table><tr><th>Counselor</th><th>Date</th><th>Time</th><th>Status</th><th></th></tr>

  </table>`;
}
function handleBooking(e){
  e.preventDefault();
  const counselor = document.getElementById('bk-counselor').value;
  const date = document.getElementById('bk-date').value;
  const time = document.getElementById('bk-time').value;
  const reason = document.getElementById('bk-reason').value.trim();
  if(!date){ showToast('Please choose a date.'); return; }
  const appt = {id:uid(), email:currentUser().email, counselor, date, time, reason, status:'Confirmed'};
  state.appointments.push(appt);
  state.lastAppointment = appt;
  awardPoints(5, 'Booked a counseling session');
  addNotification(`Appointment confirmed with ${counselor} on ${fmtDate(date)} at ${time}.`);
  go('appointment-confirmation');
}
function cancelAppointment(id){
  const a = state.appointments.find(x=>x.id===id);
  if(a){ a.status='Cancelled'; addNotification('An appointment was cancelled.'); showToast('Appointment cancelled.'); render(); }
}
function pageAppointmentConfirmation(){
  const a = state.lastAppointment || state.appointments.filter(x=>x.email===currentUser().email).slice(-1)[0];
  if(!a) return `<div class="empty-state">No appointment to show. <button class="link-btn" onclick="go('booking')">Book one now</button></div>`;

/* ---------------- MEDITATION ---------------- */
let breatheTimer = null, breatheSecondsLeft = 0, breathePhase='in';
function pageMeditation(){
  return `
  <div class="card breathe-stage">
    <div class="breathe-circle out" id="breathe-circle">Breathe</div>
    <p style="color:var(--text-dim);margin-top:16px;" id="breathe-status">Choose a session length to begin.</p>
    <div style="display:flex;gap:10px;margin-top:10px;">
      <button class="btn btn-outline btn-sm" onclick="startBreathing(60)">1 min</button>
      <button class="btn btn-outline btn-sm" onclick="startBreathing(180)">3 min</button>
      <button class="btn btn-outline btn-sm" onclick="startBreathing(300)">5 min</button>
      <button class="btn btn-sm" style="background:var(--danger);color:#fff;" onclick="stopBreathing()">Stop</button>
    </div>
  </div>
  <div class="grid grid-2">
    <div class="card"><h3>5-4-3-2-1 Grounding</h3><p style="color:var(--text-dim);">Name 5 things you see, 4 you can touch, 3 you hear, 2 you smell, and 1 you taste. This pulls your mind back into the present moment.</p></div>
    <div class="card"><h3>Progressive Muscle Relaxation</h3><p style="color:var(--text-dim);">Starting at your toes, tense each muscle group for 5 seconds, then release. Work slowly up to your shoulders and face.</p></div>
    <div class="card"><h3>Gratitude Journaling</h3><p style="color:var(--text-dim);">Write down three things, however small, that went okay today. Consistency matters more than length.</p></div>
    <div class="card"><h3>Box Breathing</h3><p style="color:var(--text-dim);">Inhale for 4 counts, hold for 4, exhale for 4, hold for 4. Repeat for several rounds to steady your nervous system.</p></div>
  </div>`;
}
function startBreathing(seconds){
  stopBreathing();
  breatheSecondsLeft = seconds;
  const circle = document.getElementById('breathe-circle');
  const statusEl = document.getElementById('breathe-status');
  function cycle(){
    breathePhase = breathePhase==='in' ? 'out':'in';
    circle.className = 'breathe-circle ' + breathePhase;
    circle.textContent = breathePhase==='in' ? 'Inhale...' : 'Exhale...';
  }
  cycle();
  const cycleInterval = setInterval(cycle, 4000);
  const countdown = setInterval(()=>{
    breatheSecondsLeft--;
    if(statusEl) statusEl.textContent = `${Math.floor(breatheSecondsLeft/60)}:${String(breatheSecondsLeft%60).padStart(2,'0')} remaining`;
    if(breatheSecondsLeft<=0){
      clearInterval(cycleInterval); clearInterval(countdown);
      circle.className='breathe-circle out'; circle.textContent='Done 🌿';
      if(statusEl) statusEl.textContent = 'Session complete. Well done.';
      const u = currentUser(); u.meditationSessions = (u.meditationSessions||0)+1;
      awardPoints(5, 'Completed a meditation session');
      checkBadges();
      showToast('Meditation session complete!');
    }
  },1000);
  breatheTimer = {cycleInterval, countdown};
}
function stopBreathing(){
  if(breatheTimer){ clearInterval(breatheTimer.cycleInterval); clearInterval(breatheTimer.countdown); breatheTimer=null; }
  const circle = document.getElementById('breathe-circle');
  const statusEl = document.getElementById('breathe-status');
  if(circle){ circle.className='breathe-circle out'; circle.textContent='Breathe'; }
  if(statusEl) statusEl.textContent = 'Choose a session length to begin.';
}

  showToast('Password updated successfully.');
}
